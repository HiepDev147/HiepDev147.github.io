<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Fingerprint Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 40px;
      text-align: center;
    }
    h1 { color: #333; }
    #fp {
      margin-top: 20px;
      padding: 10px;
      background: #fff;
      border: 1px solid #ccc;
      display: inline-block;
      min-width: 300px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Fingerprint Generator</h1>
  <p>Click nút bên dưới để tạo fingerprint:</p>
  <button onclick="generateFingerprint()">Tạo Fingerprint</button>
  <div id="fp">Fingerprint sẽ hiển thị tại đây</div>

  <script>
    async function generateFingerprint() {
      const fpPromise = import('https://fpjscdn.net/v3/sXSSDt1OM6yT1YVGdaqB')
        .then(FingerprintJS => FingerprintJS.load());

      fpPromise
        .then(fp => fp.get())
        .then(result => {
          const visitorId = result.visitorId;
          console.log("Fingerprint:", visitorId);
          document.getElementById('fp').innerText = "Fingerprint: " + visitorId;
        })
        .catch(err => {
          console.error("Lỗi tạo fingerprint:", err);
          document.getElementById('fp').innerText = "Lỗi khi tạo fingerprint.";
        });
    }
  </script>
</body>
</html>
